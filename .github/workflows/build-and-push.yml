name: Build and Push to ACR

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: crpi-5mbh0qm9ti5c2olw.cn-wulanchabu.personal.cr.aliyuncs.com
          username: ${{ secrets.ACR_USER }}
          password: ${{ secrets.ACR_PASS }}

      - name: Build and Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            crpi-5mbh0qm9ti5c2olw.cn-wulanchabu.personal.cr.aliyuncs.com/shuanbaoai/sub2api-help:latest
            crpi-5mbh0qm9ti5c2olw.cn-wulanchabu.personal.cr.aliyuncs.com/shuanbaoai/sub2api-help:${{ github.sha }}
          cache-from: type=registry,ref=crpi-5mbh0qm9ti5c2olw.cn-wulanchabu.personal.cr.aliyuncs.com/shuanbaoai/sub2api-help:latest
          cache-to: type=inline
          provenance: false
